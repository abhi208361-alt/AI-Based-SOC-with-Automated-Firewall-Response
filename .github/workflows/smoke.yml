name: Smoke E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  smoke-e2e:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r .\backend\requirements.txt

      - name: Prepare ML artifacts
        shell: pwsh
        run: |
          python .\rebuild_models_9f.py

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "7.0"

      - name: Start API (background)
        shell: pwsh
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017
          MONGODB_DB: ai_soc_firewall
        run: |
          Start-Process python -ArgumentList "-m uvicorn main:app --host 127.0.0.1 --port 8000" -WorkingDirectory ".\backend"

      - name: Wait for API
        shell: pwsh
        run: |
          $max = 60
          for ($i=1; $i -le $max; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8000/docs" -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) { exit 0 }
            } catch {}
            Start-Sleep -Seconds 2
          }
          throw "API did not become ready in time"

      - name: Run smoke E2E script
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\smoke_e2e.ps1
