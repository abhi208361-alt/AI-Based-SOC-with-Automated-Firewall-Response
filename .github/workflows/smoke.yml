name: Smoke E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  smoke-e2e:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path ".\backend\requirements.txt") {
            pip install -r .\backend\requirements.txt
          } else {
            throw "backend/requirements.txt not found"
          }
          pip install joblib scikit-learn numpy pandas

      - name: Prepare ML artifacts
        shell: pwsh
        run: |
          if (Test-Path ".\rebuild_models_9f.py") {
            python .\rebuild_models_9f.py
          } elseif (Test-Path ".\backend\rebuild_models_9f.py") {
            python .\backend\rebuild_models_9f.py
          } else {
            throw "rebuild_models_9f.py not found in repo root or backend/"
          }

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "7.0"

      - name: Start API (background)
        shell: pwsh
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017
          MONGODB_DB: ai_soc_firewall
        run: |
          Start-Process python -ArgumentList "-m uvicorn main:app --host 127.0.0.1 --port 8000" -WorkingDirectory ".\backend"

      - name: Wait for API
        shell: pwsh
        run: |
          $max = 60
          for ($i=1; $i -le $max; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8000/docs" -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -eq 200) { exit 0 }
            } catch {}
            Start-Sleep -Seconds 2
          }
          throw "API did not become ready in time"

      - name: Run smoke E2E script
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\smoke_e2e.ps1
