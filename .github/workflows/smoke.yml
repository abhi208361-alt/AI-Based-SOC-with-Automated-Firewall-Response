name: Smoke E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f "./backend/requirements.txt" ]; then
            pip install -r ./backend/requirements.txt
          else
            echo "backend/requirements.txt not found" >&2
            exit 1
          fi
          pip install pymongo python-jose[cryptography] passlib[bcrypt] python-multipart joblib scikit-learn numpy pandas

      - name: Prepare ML artifacts
        shell: bash
        run: |
          if [ -f "./rebuild_models_9f.py" ]; then
            python ./rebuild_models_9f.py
          elif [ -f "./backend/rebuild_models_9f.py" ]; then
            python ./backend/rebuild_models_9f.py
          else
            echo "rebuild_models_9f.py not found in repo root or backend/" >&2
            exit 1
          fi

      - name: Start API (background)
        shell: bash
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017
          MONGODB_DB: ai_soc_firewall
        run: |
          cd backend
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > ../api.log 2>&1 &
          echo $! > ../api.pid

      - name: Wait for API
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/docs > /dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time" >&2
          tail -n 200 api.log || true
          exit 1

      - name: Run smoke E2E script
        shell: pwsh
        run: |
          pwsh -File ./scripts/smoke_e2e.ps1
